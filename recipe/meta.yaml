{% set name = "genes2doe" %}
{% set version = "0.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/brsynth/genes2doe/archive/{{ version }}.tar.gz
  sha256: fd92a38fffe5f7e0432849fe1ba981ec4ac0f06033d921e30b4cc0c9fbcdd0a2

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install -vv .

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - pandas
    - rptools

test:
  source_files:
    - tests
  imports:
    - genes2doe
  requires:
    - pytest
    - python {{ python_min }}
  commands:
    - python -m pytest

about:
  home: https://github.com/brsynth/genes2doe
  summary: Extract genes for OptDoE
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - breakthewall
    - kenza12
